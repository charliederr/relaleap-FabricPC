run:
  experiment_id: char_smoke_hep
  seed: 1
  max_steps: 10

data:
  dataset: tiny_shakespeare_char
  seq_len: 32

training:
  residual_objective: supervised_ce

model:
  base:
    layers: 2
    hidden_dim: 32
  columns:
    num_columns: 8
    atoms_per_column: 4
    top_k: 1
    insertion_sites: 1

inference:
  pc_steps: 2
  hep_alpha: 0.0
  hep_alpha_sweep: "0.0,0.25,0.5,1.0"

outputs:
  require_summary_json: true
  require_metrics_csv: true
  require_notes_md: true
