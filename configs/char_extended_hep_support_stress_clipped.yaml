run:
  experiment_id: char_extended_hep_support_stress_clipped
  seed: 1
  max_steps: 30

data:
  dataset: tiny_shakespeare_char
  seq_len: 96

training:
  residual_objective: supervised_ce

model:
  base:
    layers: 2
    hidden_dim: 64
  columns:
    num_columns: 16
    atoms_per_column: 4
    top_k: 1
    insertion_sites: 1
    support_stress: true

inference:
  pc_steps: 4
  hep_alpha: 0.0
  hep_alpha_sweep: "0.0,0.25,0.5,1.0"
  hep_update_clip_norm: 0.01

outputs:
  require_summary_json: true
  require_metrics_csv: true
  require_notes_md: true
